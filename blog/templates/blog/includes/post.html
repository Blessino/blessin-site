<li>
    <article class="post">
        <a href="{% url "post-detail-page" post.slug %}">
            {% comment %} {{"blog/images/"|add:post.image_name}} {% endcomment %}
            <img src="{{ post.image_name }}"
                 height="320"
                 width="240"
                 alt="{{ post.title }}" />
            <div class="post__content">
                <h3>{{ post.title }}</h3>
                <p>{{ post.excerpt }}</p>
            </div>
        </a>
    </article>
</li>
